<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חידון טריוויה</title>
    <!-- תגיות SEO -->
    <meta name="description" content="חידון טריוויה כיפי עם פרס שווה בסוף!">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- צורות רקע אנימטיביות -->
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <main class="glass-container">
        <!-- מסך התחלה -->
        <div id="start-screen" class="screen active">
            <h1>חידון טריוויה</h1>
            <p>ענה נכונה על 3 שאלות ופתח את הפרס הסודי!</p>
            <button id="start-btn" class="primary-btn">התחל משחק 🚀</button>
        </div>

        <!-- מסך שאלות -->
        <div id="question-screen" class="screen">
            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
            <h2 id="question-text">טוען שאלה...</h2>
            <div id="answers-container" class="answers-grid">
                <!-- הכפתורים מוזרקים לכאן באמצעות סקריפט -->
            </div>
        </div>

        <!-- מסך סיום פרס -->
        <div id="end-screen" class="screen">
            <h1 id="end-title" style="direction: ltr; font-family: sans-serif; margin-bottom: 2rem;">С 8 марта любимая !!! ❤️</h1>
            
            <div class="prize-container">
                <div id="gift-box" class="gift-box shake">
                    <div class="gift-lid"></div>
                    <div class="gift-body"></div>
                    <div class="gift-ribbon-v"></div>
                    <div class="gift-ribbon-h"></div>
                </div>
                
                <div class="prizes-wrapper">
                    <!-- המשתמש יחליף את 'prize.jpeg' בשם הקובץ של התמונה שלו -->
                    <img id="prize-image" class="hidden-prize prize-left" src="prize.jpeg" alt="הפרס שלך" onerror="this.onerror=null; this.src='https://via.placeholder.com/400x300/1e293b/f8fafc?text=הכנס+את+התמונה+שלך+לתיקייה+במקום+prize.jpg'">
                    
                    <!-- תמונה שנייה שתעוף הצידה -->
                    <img id="flip-image" class="hidden-prize prize-right" src="flip.png" alt="הפתעה שנייה" onerror="this.onerror=null; this.src='https://via.placeholder.com/400x300/1e293b/f8fafc?text=חסר+flip.png'">
                </div>
            </div>
            
            <button id="restart-btn" class="secondary-btn hidden">שחק שוב 🔄</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
